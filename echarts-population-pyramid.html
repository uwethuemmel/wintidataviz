<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>Bevölkerungspyramide, Winterthur (ECharts)</title>
    <style>
      body { font-family: sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; color: #44443F; }
      h1 { margin-bottom: 0.25rem; }
      .meta { color: #61615E; font-size: 0.95rem; margin-top: 0.25rem; }
      .meta a { color: #61615E; }
      #controls { margin: 1rem 0; }
      #chart { width: 100%; height: 720px; margin-top: 1rem; }
    </style>
  </head>
  <body>
    <h1>Bevölkerungspyramide, Winterthur</h1>
    <p class="meta">
      Stichtag: <span id="stichtag">…</span> ·
      Quelle:
      <a href="https://www.zh.ch/de/politik-staat/statistik-daten/datenkatalog.html#/datasets/2605@stadt-winterthur">Stadt Winterthur</a>
    </p>
    <div id="controls">
      <label for="year">Jahr: </label>
      <select id="year" disabled></select>
    </div>
    <div id="chart"></div>

    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <script>
      const CSV_URL =
        "https://daten.statistik.zh.ch/ogd/daten/ressourcen/KTZH_00002605_00005330.csv";

      // Divergierende Farbskala 02 – Geschlecht (Violett ↔ Grün), §4.2 der Leitlinien.
      // 4-Farben-Set entspricht "5 Farben (mit Mitte)" ohne den neutralen Mittelpunkt:
      // Grün 300 + Grün 100 als Männer-Pol, Violett 400 + Violett 100 als Frauen-Pol.
      // Schweiz: kräftigere Stufe (innen, näher zur Null-Linie, kategorischer Anker).
      // Ausland: hellere Stufe (aussen).
      const COLORS = {
        m_schweiz: "#1EA160", // Grün 300 (= kategorische Farbe 05 gem. §3.5/§4.2)
        m_ausland: "#71C89C", // Grün 100
        w_schweiz: "#A554C7", // Violett 400 (= kategorische Farbe 02)
        w_ausland: "#D3A3E6", // Violett 100
      };
      const ANTHRAZIT = "#44443F";
      const GRID = "#DADAD6";

      const fmt = n =>
        String(Math.round(Math.abs(n))).replace(/\B(?=(\d{3})+(?!\d))/g, "'");

      const chart = echarts.init(document.getElementById("chart"));
      const yearSelect = document.getElementById("year");
      const stichtagEl = document.getElementById("stichtag");
      chart.showLoading();

      d3.csv(CSV_URL, d3.autoType).then(rows => {
        const wtRows = rows.filter(d => d.gemeinde === "Winterthur");
        const years = Array.from(new Set(wtRows.map(d => d.jahr))).sort((a, b) => b - a);
        yearSelect.innerHTML = years.map(y => `<option value="${y}">${y}</option>`).join("");
        yearSelect.disabled = false;

        chart.hideLoading();

        const update = year => {
          const yearRows = wtRows.filter(d => d.jahr === year);
          const stichtag = yearRows[0]?.stichtag;
          stichtagEl.textContent = stichtag instanceof Date
            ? stichtag.toLocaleDateString("de-CH", {
                day: "2-digit", month: "long", year: "numeric",
              })
            : String(year);

          const ageClasses = Array.from(new Set(yearRows.map(d => d.altersklasse))).sort();

          const sumGroup = (alter, geschlecht, heimat) =>
            yearRows
              .filter(d =>
                d.altersklasse === alter &&
                d.geschlecht === geschlecht &&
                d.heimat === heimat)
              .reduce((s, d) => s + (d.anzahl || 0), 0);

          // Frauen werden negiert (links der Null-Linie), Männer bleiben positiv (rechts).
          const mS = ageClasses.map(a =>  sumGroup(a, "männlich", "Schweiz"));
          const mA = ageClasses.map(a =>  sumGroup(a, "männlich", "Ausland"));
          const wS = ageClasses.map(a => -sumGroup(a, "weiblich", "Schweiz"));
          const wA = ageClasses.map(a => -sumGroup(a, "weiblich", "Ausland"));

          chart.setOption({
            grid: { left: 80, right: 30, top: 30, bottom: 70 },
            legend: {
              data: [
                "Frauen (Ausland)",
                "Frauen (Schweiz)",
                "Männer (Schweiz)",
                "Männer (Ausland)",
              ],
              bottom: 10,
              textStyle: { color: ANTHRAZIT },
              icon: "rect",
              itemWidth: 14,
              itemHeight: 12,
            },
            tooltip: {
              trigger: "axis",
              axisPointer: { type: "shadow" },
              formatter: params => {
                const age = params[0].axisValue;
                const lines = params.map(p =>
                  `<span style="display:inline-block;width:10px;height:10px;background:${p.color};margin-right:6px"></span>${p.seriesName}: ${fmt(p.value)}`
                );
                return `<strong>Altersklasse ${age}</strong><br>${lines.join("<br>")}`;
              },
              backgroundColor: "#fff",
              borderColor: GRID,
              textStyle: { color: ANTHRAZIT },
            },
            xAxis: {
              type: "value",
              axisLabel: { formatter: v => fmt(v), color: ANTHRAZIT },
              splitLine: { lineStyle: { color: GRID } },
              axisLine: { lineStyle: { color: GRID } },
              axisTick: { show: false },
            },
            yAxis: {
              type: "category",
              data: ageClasses,
              axisLabel: { color: ANTHRAZIT },
              axisTick: { show: false },
              axisLine: { lineStyle: { color: GRID } },
              splitLine: { show: false },
            },
            series: [
              {
                name: "Männer (Schweiz)",
                type: "bar",
                stack: "pyramid",
                data: mS,
                itemStyle: { color: COLORS.m_schweiz },
                emphasis: { focus: "series" },
                // Nulllinie schwarz hervorgehoben (Tornadodiagramm-Regel §6.13).
                markLine: {
                  silent: true,
                  symbol: "none",
                  label: { show: false },
                  lineStyle: { color: "#000000", width: 1.5, type: "solid" },
                  data: [{ xAxis: 0 }],
                },
              },
              {
                name: "Männer (Ausland)",
                type: "bar",
                stack: "pyramid",
                data: mA,
                itemStyle: { color: COLORS.m_ausland },
                emphasis: { focus: "series" },
              },
              {
                name: "Frauen (Schweiz)",
                type: "bar",
                stack: "pyramid",
                data: wS,
                itemStyle: { color: COLORS.w_schweiz },
                emphasis: { focus: "series" },
              },
              {
                name: "Frauen (Ausland)",
                type: "bar",
                stack: "pyramid",
                data: wA,
                itemStyle: { color: COLORS.w_ausland },
                emphasis: { focus: "series" },
              },
            ],
          });
        };

        update(years[0]);
        yearSelect.addEventListener("change", e => update(+e.target.value));
      });

      window.addEventListener("resize", () => chart.resize());
    </script>
  </body>
</html>
