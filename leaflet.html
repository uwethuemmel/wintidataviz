<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>Leaflet CSV example</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"
    />
    <style>
      body { font-family: sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
      #controls { margin: 1rem 0; display: flex; gap: 1.5rem; align-items: center; flex-wrap: wrap; }
      #map { width: 100%; height: 600px; }
      .legend { display: flex; gap: 0.75rem; font-size: 0.9rem; }
      .legend-item { display: inline-flex; align-items: center; gap: 0.35rem; }
      .legend-swatch { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
      .leaflet-popup-content { font-family: sans-serif; font-size: 0.85rem; }
    </style>
  </head>
  <body>
    <h1>Besuche in Kultureinrichtungen, Winterthur</h1>
    <p>
      Quelle:
      <a href="https://www.zh.ch/de/politik-staat/statistik-daten/datenkatalog.html#/datasets/2902@stadt-winterthur">Stadt Winterthur</a>
      · Karte: <a href="https://www.swisstopo.admin.ch/">swisstopo</a>
    </p>
    <div id="controls">
      <span><label for="year">Jahr: </label><select id="year" disabled></select></span>
      <span class="legend" id="legend"></span>
    </div>
    <div id="map"></div>

    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
      const CSV_URL =
        "https://daten.statistik.zh.ch/ogd/daten/ressourcen/KTZH_00002902_00005968.csv";
      const TILE_URL =
        "https://wmts.geo.admin.ch/1.0.0/ch.swisstopo.pixelkarte-grau/default/current/3857/{z}/{x}/{y}.jpeg";

      const TYP_COLOR = {
        Bibliothek: "#1f77b4",
        Museum: "#d62728",
        Theater: "#2ca02c",
      };

      document.getElementById("legend").innerHTML = Object.entries(TYP_COLOR)
        .map(([t, c]) =>
          `<span class="legend-item"><span class="legend-swatch" style="background:${c}"></span>${t}</span>`
        )
        .join("");

      const map = L.map("map").setView([47.500, 8.733], 13);
      L.tileLayer(TILE_URL, {
        attribution: '© <a href="https://www.swisstopo.admin.ch/">swisstopo</a>',
        maxZoom: 18,
      }).addTo(map);

      const yearSelect = document.getElementById("year");
      let pointLayer = L.layerGroup().addTo(map);

      // Square-root scaling for circle area; max visit count caps the radius.
      const radius = besuche => 3 + 25 * Math.sqrt(Math.max(0, besuche) / 400000);

      d3.csv(CSV_URL, d3.autoType).then(rows => {
        const years = Array.from(new Set(rows.map(d => d.jahr))).sort((a, b) => b - a);
        yearSelect.innerHTML = years.map(y => `<option value="${y}">${y}</option>`).join("");
        yearSelect.disabled = false;

        const update = year => {
          pointLayer.clearLayers();
          rows
            .filter(d => d.jahr === year && d.lon != null && d.lat != null)
            .forEach(d => {
              const marker = L.circleMarker([d.lat, d.lon], {
                radius: radius(d.besuche),
                color: "#fff",
                weight: 1,
                fillColor: TYP_COLOR[d.typ] ?? "#999",
                fillOpacity: 0.75,
              });
              const besuche = Number(d.besuche ?? 0).toLocaleString("de-CH");
              const kommentar = d.kommentar ? `<br><em>${d.kommentar}</em>` : "";
              marker.bindPopup(
                `<strong>${d.name}</strong><br>${d.typ} · ${besuche} Besuche${kommentar}`
              );
              marker.addTo(pointLayer);
            });
        };

        update(years[0]);
        yearSelect.addEventListener("change", e => update(+e.target.value));
      });
    </script>
  </body>
</html>
