<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>ECharts CSV example</title>
    <style>
      body { font-family: sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
      #controls { margin: 1rem 0; }
      #chart { width: 100%; height: 400px; }
    </style>
  </head>
  <body>
    <h1>Besuche in Kultureinrichtungen, Stadt Winterthur</h1>
    <p>Quelle: <a href="https://www.zh.ch/de/politik-staat/statistik-daten/datenkatalog.html#/datasets/2902@stadt-winterthur">Stadt Winterthur</a></p>
    <div id="controls">
      <label for="year">Jahr: </label>
      <select id="year" disabled></select>
    </div>
    <div id="chart"></div>

    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <script>
      const CSV_URL =
        "https://daten.statistik.zh.ch/ogd/daten/ressourcen/KTZH_00002902_00005968.csv";

      const chart = echarts.init(document.getElementById("chart"));
      const yearSelect = document.getElementById("year");
      chart.showLoading();

      d3.csv(CSV_URL, d3.autoType).then(rows => {
        const years = Array.from(new Set(rows.map(d => d.jahr))).sort((a, b) => b - a);
        yearSelect.innerHTML = years.map(y => `<option value="${y}">${y}</option>`).join("");
        yearSelect.disabled = false;

        chart.hideLoading();
        chart.setOption({
          tooltip: { valueFormatter: v => v.toLocaleString("de-CH") },
          xAxis: { type: "category" },
          yAxis: { type: "value" },
          series: [{ type: "bar" }],
        });

        const update = year => {
          const totals = d3.rollup(
            rows.filter(d => d.jahr === year),
            v => d3.sum(v, d => d.besuche),
            d => d.typ
          );
          const data = Array.from(totals, ([category, yValue]) => ({ category, yValue }))
            .sort((a, b) => b.yValue - a.yValue);

          chart.setOption({
            title: { text: `Besuche pro Einrichtungstyp (${year})`, left: "center" },
            xAxis: { data: data.map(d => d.category) },
            series: [{ data: data.map(d => d.yValue) }],
          });
        };

        update(years[0]);
        yearSelect.addEventListener("change", e => update(+e.target.value));
      });

      window.addEventListener("resize", () => chart.resize());
    </script>
  </body>
</html>
