<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>Leaflet CSV example</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"
    />
    <style>
      body { font-family: sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
      #controls { margin: 1rem 0; display: flex; gap: 1.5rem; align-items: center; flex-wrap: wrap; }
      #map { width: 100%; height: 600px; }
      .legend { display: flex; gap: 0.75rem; font-size: 0.9rem; }
      .legend-item { display: inline-flex; align-items: center; gap: 0.35rem; }
      .legend-swatch { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
      .leaflet-popup-content,
      .leaflet-tooltip { font-family: sans-serif; font-size: 0.85rem; }
    </style>
  </head>
  <body>
    <h1>Besuche in Kultureinrichtungen, Winterthur</h1>
    <p>
      Quelle:
      <a href="https://www.zh.ch/de/politik-staat/statistik-daten/datenkatalog.html#/datasets/2902@stadt-winterthur">Stadt Winterthur</a>
      · Karte: <a href="https://carto.com/attributions">CARTO</a> /
      <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>
    </p>
    <div id="controls">
      <span><label for="year">Jahr: </label><select id="year" disabled></select></span>
      <span class="legend" id="legend"></span>
    </div>
    <div id="map"></div>

    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
      const CSV_URL =
        "https://daten.statistik.zh.ch/ogd/daten/ressourcen/KTZH_00002902_00005968.csv";
      const GEOJSON_URL = "winterthur_quartiere_simplified.geojson";
      const TILE_URL =
        "https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png";

      // Kategorische Palette §2 der Leitlinien, Farben 01–03 in fester Reihenfolge.
      const TYP_COLOR = {
        Bibliothek: "#CB2512", // 01 Rot
        Museum:     "#A554C7", // 02 Violett
        Theater:    "#1592C0", // 03 Blau
      };

      document.getElementById("legend").innerHTML = Object.entries(TYP_COLOR)
        .map(([t, c]) =>
          `<span class="legend-item"><span class="legend-swatch" style="background:${c}"></span>${t}</span>`
        )
        .join("");

      const map = L.map("map").setView([47.500, 8.733], 13);
      L.tileLayer(TILE_URL, {
        attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> · <a href="https://carto.com/attributions">CARTO</a>',
        subdomains: "abcd",
        maxZoom: 20,
      }).addTo(map);

      const yearSelect = document.getElementById("year");
      let pointLayer = L.layerGroup().addTo(map);

      // Square-root scaling for circle area; max visit count caps the radius.
      const radius = besuche => 3 + 25 * Math.sqrt(Math.max(0, besuche) / 400000);

      Promise.all([
        d3.csv(CSV_URL, d3.autoType),
        d3.json(GEOJSON_URL),
      ]).then(([rows, winterthur]) => {
        // Inverse-polygon-Maske: grosser Aussenring mit Winterthurs Polygonen als Löcher.
        // Bei Leafleats evenodd-Füllregel fällt der Innenraum auf die Tiles durch,
        // ausserhalb wird mit Weiss überdeckt – die Karte ist also visuell auf die
        // Stadtgrenze begrenzt.
        map.createPane("winterthur-mask");
        const maskPane = map.getPane("winterthur-mask");
        maskPane.style.zIndex = "350"; // zwischen tilePane (200) und overlayPane (400)
        maskPane.style.pointerEvents = "none";

        const worldRing = [
          [85, -180], [85, 180], [-85, 180], [-85, -180], [85, -180],
        ];
        const holes = winterthur.features
          .flatMap(f => {
            const g = f.geometry;
            if (g.type === "Polygon") return [g.coordinates[0]];
            if (g.type === "MultiPolygon") return g.coordinates.map(p => p[0]);
            return [];
          })
          .map(ring => ring.map(([lon, lat]) => [lat, lon]));

        // Eigener SVG-Renderer mit grossem Padding, damit die Maske auch während
        // Pan-Animationen / Rubber-Band-Snaps die gesamte sichtbare Fläche abdeckt.
        const maskRenderer = L.svg({ pane: "winterthur-mask", padding: 5 });

        L.polygon([worldRing, ...holes], {
          pane: "winterthur-mask",
          renderer: maskRenderer,
          stroke: false,
          fillColor: "#FFFFFF", // Corporate Weiss §1
          fillOpacity: 1,
          interactive: false,
        }).addTo(map);

        // Anfangsansicht auf die Stadtgrenze fitten und Panning auf das gleiche
        // Rechteck (mit 10 % Puffer) begrenzen.
        const cityBounds = L.geoJSON(winterthur).getBounds();
        map.fitBounds(cityBounds);
        map.setMaxBounds(cityBounds.pad(0.1));
        map.setMinZoom(map.getBoundsZoom(cityBounds));

        const years = Array.from(new Set(rows.map(d => d.jahr))).sort((a, b) => b - a);
        yearSelect.innerHTML = years.map(y => `<option value="${y}">${y}</option>`).join("");
        yearSelect.disabled = false;

        const update = year => {
          pointLayer.clearLayers();
          rows
            .filter(d => d.jahr === year && d.lon != null && d.lat != null)
            .forEach(d => {
              const marker = L.circleMarker([d.lat, d.lon], {
                radius: radius(d.besuche),
                color: "#fff",
                weight: 1,
                fillColor: TYP_COLOR[d.typ] ?? "#999",
                fillOpacity: 0.75,
              });
              const besuche = Number(d.besuche ?? 0).toLocaleString("de-CH");
              const kommentar = d.kommentar ? `<br><em>${d.kommentar}</em>` : "";
              marker.bindTooltip(
                `<strong>${d.name}</strong><br>${d.typ} · ${besuche} Besuche${kommentar}`,
                { direction: "top", offset: [0, -2] }
              );
              marker.addTo(pointLayer);
            });
        };

        update(years[0]);
        yearSelect.addEventListener("change", e => update(+e.target.value));
      });
    </script>
  </body>
</html>
